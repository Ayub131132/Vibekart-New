name: vibekart_core
description: Shared models, API services, and UI components for Vibekart.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^2.5.1
  http: ^1.2.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  lucide_icons: ^0.320.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2

flutter:
  uses-material-design: true
